<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="style.css">
		<title>iBeenBS's Portfolio</title>
	</head>
	<body>	
		<div class="reveal">
				<script>
					window.addEventListener('load', () => {
						document.querySelectorAll('.reveal').forEach(el => {
						el.classList.add('show');
						});
					});	
				</script>
				<script>
					const light = 
						document.querySelector(".mouse-light");
						document.addEventListener("mousemove", (e) => 
						{
							light.style.left = e.clientX + "px";
							light.style.top = e.clientY + "px";
						};
				</script>
				<script>
					const buttons = document.querySelectorAll(".btn");
					
					buttons.forEach(btn => {
						btn.addEventListener("click", () => {
							buttons.forEach(b => b.classList.remove("active"));
							btn.classList.add("active");
						});
					});
				</script>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
		<link href="htps://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<nav>
			<a href="index.html"><button class="btn"><img class="nav-icon" src="https://i.imgur.com/71AEbyY.png"> Home</button></a>
			<a href="sobre.html"><button class="btn"><img class="nav-icon" src="https://i.imgur.com/wl66Xwp.png"> Sobre</button></a>
			<a href="projetos.html"><button class="btn"><img class="nav-icon" src="https://i.imgur.com/iV8DqKK.png"> Projetos</button></a>
			<a href="servicos.html"><button class="btn"><img class="nav-icon" src="https://i.imgur.com/mM9lYir.png"> Serviços</button></a>
			<a href="contato.html"><button class="btn"><img class="nav-icon" src="https://i.imgur.com/TDxCvbH.png"> Contato</button></a>
		</nav>
		
		<div class="web-service">
			<img class="web-service-img" src="https://i.imgur.com/IvMIKu4.png">
			
			<a class="web-pages">Web Pages</a>
			<a class="web-desc"> Serviço dedicado,<br> moderno e completo. <br> A web página é feita da forma <br>em que o cliente solicitou. </a>
			<div class="price-web-pages">
				<a><span class="glow">Valor a negociar </span></a>
			</div>
			<div class="html-web-pages">
				<a><span class="glow">Html</span></a>
			</div>
			<div class="css-web-pages">
				<a><span class="glow">CSS</span></a>
			</div>
			<div class="js-web-pages">
				<a><span class="glow">JS</span></a>
			</div>
			<div class="react-web-pages">
				<a><span class="glow">React</span></a>
			</div>
			<div class="contact-btn">
				<a class="a" href="contato.html"><span class="glow">Contratar</span></a>
			</div>
		</div>
		
	<script>
		window.addEventListener("scroll", function(){
			const nav = document.querySelector("nav");
			if(window.scrollY > 150) {
				nav.classList.add("scroll");
			} else {
				nav.classList.remove("scroll");
			}
		});
	</script>
		</div>
	</body>
</html>
